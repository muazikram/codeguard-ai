name: CodeGuard Security Scan

on:
  pull_request:
    branches: [ main, master, develop ]
  push:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    
    - name: Download CodeGuard AI
      run: |
        curl -o codeguard.py https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/main/codeguard.py
        chmod +x codeguard.py
    
    - name: Run CodeGuard Security Scan
      id: scan
      run: |
        python3 codeguard.py . --ci > scan_results.json
        cat scan_results.json
      continue-on-error: true
    
    - name: Parse scan results
      id: parse
      run: |
        STATUS=$(cat scan_results.json | python3 -c "import sys, json; print(json.load(sys.stdin)['status'])")
        CRITICAL=$(cat scan_results.json | python3 -c "import sys, json; print(json.load(sys.stdin)['severity_counts']['Critical'])")
        HIGH=$(cat scan_results.json | python3 -c "import sys, json; print(json.load(sys.stdin)['severity_counts']['High'])")
        MEDIUM=$(cat scan_results.json | python3 -c "import sys, json; print(json.load(sys.stdin)['severity_counts']['Medium'])")
        LOW=$(cat scan_results.json | python3 -c "import sys, json; print(json.load(sys.stdin)['severity_counts']['Low'])")
        TOTAL=$(cat scan_results.json | python3 -c "import sys, json; print(json.load(sys.stdin)['total_findings'])")
        
        echo "status=$STATUS" >> $GITHUB_OUTPUT
        echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
        echo "high=$HIGH" >> $GITHUB_OUTPUT
        echo "medium=$MEDIUM" >> $GITHUB_OUTPUT
        echo "low=$LOW" >> $GITHUB_OUTPUT
        echo "total=$TOTAL" >> $GITHUB_OUTPUT
    
    - name: Comment on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const status = '${{ steps.parse.outputs.status }}';
          const critical = '${{ steps.parse.outputs.critical }}';
          const high = '${{ steps.parse.outputs.high }}';
          const medium = '${{ steps.parse.outputs.medium }}';
          const low = '${{ steps.parse.outputs.low }}';
          const total = '${{ steps.parse.outputs.total }}';
          
          const statusEmoji = status === 'pass' ? 'âś…' : 'âťŚ';
          const statusText = status === 'pass' ? 'PASSED' : 'FAILED';
          
          const body = `## ${statusEmoji} CodeGuard Security Scan ${statusText}
          
          ### Summary
          - **Total Findings:** ${total}
          - đź”´ **Critical:** ${critical}
          - đźź  **High:** ${high}
          - đźźˇ **Medium:** ${medium}
          - đź”µ **Low:** ${low}
          
          ${status === 'fail' ? 'âš ď¸Ź **Action Required:** This PR has Critical or High severity security vulnerabilities that must be addressed.' : 'âś… **All Clear:** No Critical or High severity vulnerabilities detected.'}
          
          <details>
          <summary>View Full Scan Results</summary>
          
          \`\`\`json
          ${require('fs').readFileSync('scan_results.json', 'utf8')}
          \`\`\`
          
          </details>`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: body
          });
    
    - name: Fail if vulnerabilities found
      if: steps.parse.outputs.status == 'fail'
      run: |
        echo "âťŚ Security scan failed: Critical or High severity vulnerabilities detected"
        echo "Critical: ${{ steps.parse.outputs.critical }}"
        echo "High: ${{ steps.parse.outputs.high }}"
        exit 1
    
    - name: Success
      if: steps.parse.outputs.status == 'pass'
      run: |
        echo "âś… Security scan passed: No Critical or High severity vulnerabilities"
        echo "Medium: ${{ steps.parse.outputs.medium }}"
        echo "Low: ${{ steps.parse.outputs.low }}"

